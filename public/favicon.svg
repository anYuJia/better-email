<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions of Gradients and Shadows -->
  <defs>
    <!-- Background Premium Gradient (Deep space dark indigo to vibrant violet) -->
    <linearGradient id="appIconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="40%" stop-color="#312E81" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Metallic/Glossy Envelope Body Gradient -->
    <linearGradient id="envelopeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9E2EC" />
    </linearGradient>

    <!-- Glowing Accent Gradient for the 'Better' check/swoosh -->
    <linearGradient id="glowingAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />   <!-- Emerald Green -->
      <stop offset="100%" stop-color="#06B6D4" />  <!-- Cyan -->
    </linearGradient>

    <!-- Soft Drop Shadow Filter for Layer Depth -->
    <filter id="naturalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.65" />
    </filter>

    <!-- Envelope Flap Shadow to separate layers -->
    <filter id="flapShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1E1B4B" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Card with rounded corners (macOS / iOS inspired squire shape) -->
  <rect width="480" height="480" x="16" y="16" rx="108" fill="url(#appIconBg)" />

  <!-- Subtle Inner Border Glow -->
  <rect width="476" height="476" x="18" y="18" rx="106" fill="none" stroke="#6366F1" stroke-width="3" stroke-opacity="0.4" />

  <!-- Main Envelope Group with shadow -->
  <g filter="url(#naturalShadow)">
    <!-- Base/Back of the Envelope -->
    <rect width="280" height="180" x="116" y="176" rx="20" fill="url(#envelopeBody)" />

    <!-- Left and Right Folding Wings (Inside design representation) -->
    <path d="M 116 356 L 220 270 C 235 258 277 258 292 270 L 396 356 Z" fill="#BCCCDC" opacity="0.9" />

    <!-- Top Folding Flap (With soft shadow overlapping the base) -->
    <path d="M 116 176 L 240 268 C 250 275 262 275 272 268 L 396 176 Z" fill="#F0F4F8" filter="url(#flapShadow)" />
  </g>

  <!-- Glowing Checkmark / Wing (Symbolizes "Better" & Fast Local Delivery) -->
  <g filter="url(#naturalShadow)">
    <path d="M 230 330 L 290 390 L 410 240" 
          fill="none" 
          stroke="url(#glowingAccent)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
